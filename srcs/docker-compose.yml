name: inception

version: '1'

services:
# web server
  nginx:
    container_name: nginx
    build: 
      context: ./requirements/NGINX
      dockerfile: ./requirements/NGINX/Dockerfile
    depends_on:
      - wordpress
    networks:
      - network
    ports:
      - 443:443
    volumes:
      - wordpress_data:/var/www/html
    restart: on-failure
# website
  wordpress:
    container_name: wordpress
    build: 
      context: ./requirements/WordPress
      dockerfile: ./requirements/WordPress/Dockerfile
    depends_on:
      - mariadb
    networks:
      - network
    #expose:
    #  - "9000"
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    restart: on-failure
# database
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/MariaDB
      dockerfile: ./requirements/MariaDB/Dockerfile
    networks:
      - network
    #expose:
    #    - "3306"
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: on-failure

# We need to name each container.
# The builds are specified in the local files. We separate them into "contexts" and "dockerfile" to visibly call the dockerfiles as is demanded in the subject ?
# Just like with a Makefile, we can make some targets dependant on others. By making WordPress dependant on MariaDB, we make sure the data base is launched before the website. By making NGINX dependant on WordPress, we make sure the website is launched before the server ?
# We need to specify the networks (?)
# For NGINX, we need to specfiy a port (443 is the one demanded in the subject).
# For MariaDB and WordPress, we need to specify the env (local).
# Both NGINX and WordPress must have access to the WordPress volume; ONLY MariaDB must have access to the MariaDB volume.
# By using restart: on-failure, we make sure that any container shutting down restarts itself, as is demanded in the subject.
